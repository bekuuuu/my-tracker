<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resell Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0a;color:#e0e0e0;min-height:100vh;padding:1.25rem}
h1{font-size:18px;font-weight:700;color:#fff;margin-bottom:1.25rem;letter-spacing:-0.3px}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.stats-grid2{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.25rem}
.metric{background:#161616;border:0.5px solid #222;border-radius:10px;padding:.75rem}
.metric .ml{font-size:10px;color:#555;margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em}
.metric .mv{font-size:18px;font-weight:700;color:#fff}
.metric .mv.g{color:#4ade80}
.metric .mv.r{color:#f87171}
.metric .mv.b{color:#60a5fa}
.metric .mv.y{color:#fbbf24}
.form-card{background:#161616;border:0.5px solid #222;border-radius:12px;padding:1rem;margin-bottom:1.25rem}
.form-card h2{font-size:12px;font-weight:600;color:#555;margin-bottom:12px;text-transform:uppercase;letter-spacing:.06em}
.field{margin-bottom:8px}
.field label{font-size:11px;color:#555;display:block;margin-bottom:3px}
.field input,.field select,.field textarea{width:100%;background:#0f0f0f;border:0.5px solid #2a2a2a;border-radius:8px;padding:8px 10px;color:#e0e0e0;font-size:13px;outline:none;font-family:inherit;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#444}
.field select option{background:#161616}
.field textarea{min-height:60px;resize:vertical}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.img-preview{width:100%;height:100px;object-fit:cover;border-radius:8px;margin-top:6px;display:none}
.add-btn{width:100%;background:#fff;color:#000;border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;transition:background .15s}
.add-btn:hover{background:#ddd}
.tab-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.tab{font-size:11px;padding:5px 12px;border-radius:99px;border:0.5px solid #2a2a2a;background:transparent;color:#666;cursor:pointer;transition:all .15s}
.tab.active{background:#fff;color:#000;border-color:#fff}
.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.item-card{background:#161616;border:0.5px solid #222;border-radius:12px;overflow:hidden;transition:border-color .15s}
.item-card:hover{border-color:#333}
.item-img{width:100%;height:160px;object-fit:cover;display:block;background:#111}
.item-img-ph{width:100%;height:80px;background:#111;display:flex;align-items:center;justify-content:center;color:#333;font-size:11px}
.item-body{padding:.875rem}
.item-name{font-size:14px;font-weight:700;color:#fff;margin-bottom:5px}
.item-meta{font-size:11px;color:#666;margin-bottom:2px}
.item-notes{font-size:11px;color:#888;margin-top:5px;font-style:italic;border-left:2px solid #2a2a2a;padding-left:6px}
.item-link{font-size:11px;color:#60a5fa;word-break:break-all;display:block;margin-top:5px}
.item-profit{font-size:12px;font-weight:700;margin-top:5px}
.item-profit.pos{color:#4ade80}
.item-profit.neg{color:#f87171}
.status-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:99px;font-weight:700;margin-bottom:6px;cursor:pointer;transition:opacity .15s}
.status-badge:hover{opacity:.75}
.s-want{background:#1a2a3a;color:#60a5fa}
.s-ordered{background:#2a1f00;color:#fbbf24}
.s-sold{background:#0f2016;color:#4ade80}
.item-actions{display:flex;gap:6px;margin-top:8px}
.action-btn{flex:1;font-size:11px;padding:5px 8px;border-radius:6px;border:0.5px solid #2a2a2a;background:transparent;color:#888;cursor:pointer;transition:all .15s}
.action-btn:hover{border-color:#444;color:#ccc}
.action-btn.sold-btn{border-color:#1a3a25;color:#4ade80}
.action-btn.sold-btn:hover{background:#0f2016}
.del-btn-sm{font-size:11px;padding:5px 8px;border-radius:6px;border:0.5px solid #2a2a2a;background:transparent;color:#555;cursor:pointer}
.del-btn-sm:hover{border-color:#f87171;color:#f87171}
.empty{text-align:center;color:#333;font-size:13px;padding:3rem 0;grid-column:1/-1}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;align-items:center;justify-content:center;padding:1rem}
.modal-bg.open{display:flex}
.modal{background:#161616;border:0.5px solid #2a2a2a;border-radius:14px;padding:1.25rem;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:700;margin-bottom:1rem;color:#fff}
.modal-btns{display:flex;gap:8px;margin-top:1rem}
.modal-btns button{flex:1;padding:9px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none}
.save-btn{background:#fff;color:#000}
.save-btn:hover{background:#ddd}
.cancel-btn{background:#222;color:#aaa}
.cancel-btn:hover{background:#2a2a2a}
@media(max-width:480px){.stats-grid,.stats-grid2{grid-template-columns:1fr 1fr}.row3{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<h1>Resell Tracker</h1>

<div class="stats-grid">
  <div class="metric"><div class="ml">Нийт бараа</div><div class="mv" id="s-total">0</div></div>
  <div class="metric"><div class="ml">Нийт зардал</div><div class="mv r" id="s-cost">€0</div></div>
  <div class="metric"><div class="ml">Нийт ашиг</div><div class="mv g" id="s-profit">€0</div></div>
</div>
<div class="stats-grid2">
  <div class="metric"><div class="ml">Сонирхож</div><div class="mv b" id="s-want">0</div></div>
  <div class="metric"><div class="ml">Захиалсан</div><div class="mv y" id="s-ordered">0</div></div>
  <div class="metric"><div class="ml">Зарагдсан</div><div class="mv g" id="s-sold">0</div></div>
</div>

<div class="form-card">
  <h2>Шинэ бараа нэмэх</h2>
  <div class="field">
    <label>Барааны нэр</label>
    <input type="text" id="f-name" placeholder="e.g. Crypta Celsis black hoodie">
  </div>
  <div class="row2" style="margin-bottom:8px">
    <div class="field" style="margin:0"><label>Төрөл</label>
      <select id="f-type"><option>Hoodie</option><option>Zip hoodie</option><option>T-shirt</option><option>Shirt</option><option>Sweatshirt</option></select>
    </div>
    <div class="field" style="margin:0"><label>Статус</label>
      <select id="f-status"><option value="want">Сонирхож байна</option><option value="ordered">Захиалсан</option><option value="sold">Зарагдсан</option></select>
    </div>
  </div>
  <div class="row3" style="margin-bottom:8px">
    <div class="field" style="margin:0"><label>Хэмжээ</label>
      <select id="f-size"><option>XS</option><option>S</option><option selected>M</option><option>L</option><option>XL</option><option>XXL</option></select>
    </div>
    <div class="field" style="margin:0"><label>Авах үнэ (€)</label>
      <input type="number" id="f-buy" placeholder="22" min="0">
    </div>
    <div class="field" style="margin:0"><label>Зарах үнэ (€)</label>
      <input type="number" id="f-sell" placeholder="65" min="0">
    </div>
  </div>
  <div class="field"><label>Өнгө</label><input type="text" id="f-color" placeholder="Black, White..."></div>
  <div class="field"><label>Бараа линк (Weidian / DHgate)</label><input type="text" id="f-link" placeholder="https://..."></div>
  <div class="field"><label>Зургийн URL</label>
    <input type="text" id="f-imgurl" placeholder="https://img..." oninput="prevUrl(this.value)">
    <img id="prev-url" class="img-preview" alt="preview">
  </div>
  <div class="field"><label>Эсвэл зураг upload</label>
    <input type="file" id="f-img" accept="image/*" onchange="prevFile(this)">
    <img id="prev-file" class="img-preview" alt="preview">
  </div>
  <div class="field"><label>Notes / тэмдэглэл</label>
    <textarea id="f-notes" placeholder="Захиалгын дугаар, хүргэлтийн мэдээлэл..."></textarea>
  </div>
  <button class="add-btn" onclick="addItem()">+ Нэмэх</button>
</div>

<div class="tab-row">
  <button class="tab active" onclick="setFilter('all',this)">Бүгд</button>
  <button class="tab" onclick="setFilter('want',this)">Сонирхож байна</button>
  <button class="tab" onclick="setFilter('ordered',this)">Захиалсан</button>
  <button class="tab" onclick="setFilter('sold',this)">Зарагдсан</button>
</div>

<div class="items-grid" id="list"></div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <h3>Бараа засах</h3>
    <div class="field"><label>Барааны нэр</label><input type="text" id="e-name"></div>
    <div class="row2" style="margin-bottom:8px">
      <div class="field" style="margin:0"><label>Төрөл</label>
        <select id="e-type"><option>Hoodie</option><option>Zip hoodie</option><option>T-shirt</option><option>Shirt</option><option>Sweatshirt</option></select>
      </div>
      <div class="field" style="margin:0"><label>Статус</label>
        <select id="e-status"><option value="want">Сонирхож байна</option><option value="ordered">Захиалсан</option><option value="sold">Зарагдсан</option></select>
      </div>
    </div>
    <div class="row3" style="margin-bottom:8px">
      <div class="field" style="margin:0"><label>Хэмжээ</label>
        <select id="e-size"><option>XS</option><option>S</option><option>M</option><option>L</option><option>XL</option><option>XXL</option></select>
      </div>
      <div class="field" style="margin:0"><label>Авах үнэ (€)</label><input type="number" id="e-buy" min="0"></div>
      <div class="field" style="margin:0"><label>Зарах үнэ (€)</label><input type="number" id="e-sell" min="0"></div>
    </div>
    <div class="field"><label>Өнгө</label><input type="text" id="e-color"></div>
    <div class="field"><label>Линк</label><input type="text" id="e-link"></div>
    <div class="field"><label>Notes</label><textarea id="e-notes"></textarea></div>
    <div class="modal-btns">
      <button class="cancel-btn" onclick="closeModal()">Болих</button>
      <button class="save-btn" onclick="saveEdit()">Хадгалах</button>
    </div>
  </div>
</div>

<script>
let items=[];
let filter='all';
let editIdx=-1;
try{items=JSON.parse(localStorage.getItem('resell_v3')||'[]');}catch(e){}

function save(){try{localStorage.setItem('resell_v3',JSON.stringify(items));}catch(e){}}

function prevUrl(v){const i=document.getElementById('prev-url');i.src=v;i.style.display=v?'block':'none';}
function prevFile(input){const i=document.getElementById('prev-file');if(input.files&&input.files[0]){const r=new FileReader();r.onload=e=>{i.src=e.target.result;i.style.display='block';};r.readAsDataURL(input.files[0]);}}

function badge(s){
  if(s==='want')return'<span class="status-badge s-want" title="Дарж статус солих">Сонирхож байна</span>';
  if(s==='ordered')return'<span class="status-badge s-ordered" title="Дарж статус солих">Захиалсан</span>';
  return'<span class="status-badge s-sold">Зарагдсан</span>';
}

function setFilter(f,el){filter=f;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');render();}

function markSold(i){items[i].status='sold';save();render();}
function cycleStatus(i){const s=items[i].status;items[i].status=s==='want'?'ordered':s==='ordered'?'sold':'want';save();render();}

function render(){
  const list=document.getElementById('list');
  const filtered=filter==='all'?items:items.filter(it=>it.status===filter);
  if(!filtered.length){list.innerHTML='<div class="empty">Бараа байхгүй байна.</div>';updateStats();return;}
  list.innerHTML=filtered.map(it=>{
    const ri=items.indexOf(it);
    const profit=(it.sell||0)-(it.buy||0);
    const imgHtml=it.img?`<img class="item-img" src="${it.img}" alt="${it.name}" onerror="this.style.display='none'">`:`<div class="item-img-ph">Зураг байхгүй</div>`;
    const linkHtml=it.link?`<a class="item-link" href="${it.link}" target="_blank">${it.link.length>40?it.link.slice(0,40)+'...':it.link}</a>`:'';
    const notesHtml=it.notes?`<div class="item-notes">${it.notes}</div>`:'';
    const profitHtml=it.buy?`<div class="item-profit ${profit>=0?'pos':'neg'}">Ашиг: €${profit}</div>`:'';
    const soldBtn=it.status==='ordered'?`<button class="action-btn sold-btn" onclick="markSold(${ri})">Зарагдсан</button>`:'';
    return`<div class="item-card">
      ${imgHtml}
      <div class="item-body">
        <div onclick="cycleStatus(${ri})" style="display:inline-block">${badge(it.status)}</div>
        <div class="item-name">${it.name}</div>
        <div class="item-meta">${it.type} · ${it.size} · ${it.color||'—'}</div>
        <div class="item-meta">Авах: €${it.buy||'—'} · Зарах: €${it.sell||'—'}</div>
        ${profitHtml}${notesHtml}${linkHtml}
        <div class="item-actions">
          ${soldBtn}
          <button class="action-btn" onclick="openEdit(${ri})">Засах</button>
          <button class="del-btn-sm" onclick="removeItem(${ri})">Устгах</button>
        </div>
      </div>
    </div>`;
  }).join('');
  updateStats();
}

function updateStats(){
  const total=items.length;
  const cost=items.reduce((a,b)=>a+(+b.buy||0),0);
  const soldItems=items.filter(i=>i.status==='sold');
  const profit=soldItems.reduce((a,b)=>a+((+b.sell||0)-(+b.buy||0)),0);
  const want=items.filter(i=>i.status==='want').length;
  const ordered=items.filter(i=>i.status==='ordered').length;
  const sold=soldItems.length;
  document.getElementById('s-total').textContent=total;
  document.getElementById('s-cost').textContent='€'+cost;
  const pel=document.getElementById('s-profit');
  pel.textContent=(profit>=0?'€':'−€')+Math.abs(profit);
  pel.className='mv '+(profit>=0?'g':'r');
  document.getElementById('s-want').textContent=want;
  document.getElementById('s-ordered').textContent=ordered;
  document.getElementById('s-sold').textContent=sold;
}

function addItem(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){alert('Барааны нэр оруулна уу.');return;}
  const fileImg=document.getElementById('prev-file').src;
  const urlImg=document.getElementById('f-imgurl').value.trim();
  const img=fileImg&&fileImg!==window.location.href?fileImg:(urlImg||'');
  items.unshift({name,type:document.getElementById('f-type').value,status:document.getElementById('f-status').value,size:document.getElementById('f-size').value,color:document.getElementById('f-color').value.trim(),buy:parseFloat(document.getElementById('f-buy').value)||0,sell:parseFloat(document.getElementById('f-sell').value)||0,link:document.getElementById('f-link').value.trim(),notes:document.getElementById('f-notes').value.trim(),img});
  save();render();
  ['f-name','f-color','f-buy','f-sell','f-link','f-imgurl','f-notes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('prev-file').style.display='none';
  document.getElementById('prev-url').style.display='none';
  document.getElementById('f-img').value='';
}

function removeItem(i){if(confirm('Устгах уу?')){items.splice(i,1);save();render();}}

function openEdit(i){
  editIdx=i;
  const it=items[i];
  document.getElementById('e-name').value=it.name;
  document.getElementById('e-type').value=it.type;
  document.getElementById('e-status').value=it.status;
  document.getElementById('e-size').value=it.size;
  document.getElementById('e-buy').value=it.buy||'';
  document.getElementById('e-sell').value=it.sell||'';
  document.getElementById('e-color').value=it.color||'';
  document.getElementById('e-link').value=it.link||'';
  document.getElementById('e-notes').value=it.notes||'';
  document.getElementById('modal').classList.add('open');
}

function closeModal(){document.getElementById('modal').classList.remove('open');editIdx=-1;}

function saveEdit(){
  if(editIdx<0)return;
  const it=items[editIdx];
  it.name=document.getElementById('e-name').value.trim()||it.name;
  it.type=document.getElementById('e-type').value;
  it.status=document.getElementById('e-status').value;
  it.size=document.getElementById('e-size').value;
  it.buy=parseFloat(document.getElementById('e-buy').value)||0;
  it.sell=parseFloat(document.getElementById('e-sell').value)||0;
  it.color=document.getElementById('e-color').value.trim();
  it.link=document.getElementById('e-link').value.trim();
  it.notes=document.getElementById('e-notes').value.trim();
  save();render();closeModal();
}

document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
render();
</script>
</body>
</html>
